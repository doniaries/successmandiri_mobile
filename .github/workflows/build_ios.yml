name: Build iOS (No Codesign)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.9' # Disamakan dengan versi Flutter SDK Anda

      - name: Get Packages
        run: flutter pub get

      - name: Build iOS IPA (Unsigned)
        run: |
          flutter build ipa --no-codesign

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/archive/Runner.xcarchive
